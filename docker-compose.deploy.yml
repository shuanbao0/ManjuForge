version: "3.8"

# Deployment compose file: pulls pre-built images from Docker Hub
# (no local build context required).
#
# Usage:
#   cp .env.example .env   # fill in DASHSCOPE_API_KEY etc.
#   IMAGE_TAG=v0.1.0 docker compose -f docker-compose.deploy.yml pull
#   IMAGE_TAG=v0.1.0 docker compose -f docker-compose.deploy.yml up -d
#
# IMAGE_TAG defaults to `latest` if not set.

services:
  backend:
    image: shuanbaoai/manju-forge-backend:${IMAGE_TAG:-latest}
    container_name: manju-forge-backend
    env_file:
      - .env
    environment:
      - NO_PROXY=*.aliyuncs.com,localhost,127.0.0.1
    volumes:
      - ./output:/app/output
    ports:
      - "17177:17177"
    restart: unless-stopped

  frontend:
    image: shuanbaoai/manju-forge-frontend:${IMAGE_TAG:-latest}
    container_name: manju-forge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
