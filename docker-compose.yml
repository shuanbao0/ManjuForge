version: "3.8"

# Local-build compose file. Use this during development:
#   docker compose up -d --build
#
# For pulling pre-built images from Docker Hub instead, see
# docker-compose.deploy.yml.

services:
  backend:
    image: shuanbaoai/manju-forge-backend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: manju-forge-backend
    env_file:
      - .env
    environment:
      - NO_PROXY=*.aliyuncs.com,localhost,127.0.0.1
    volumes:
      - ./output:/app/output
    ports:
      - "17177:17177"
    restart: unless-stopped

  frontend:
    image: shuanbaoai/manju-forge-frontend:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: manju-forge-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
