server {
    listen 80;
    server_name _;
    client_max_body_size 200M;

    root /usr/share/nginx/html;
    index index.html;

    # Frontend routes (SPA fallback)
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Backend API surface — single regex covers every router prefix
    # registered in src/apps/comic_gen/api.py + src/{auth,admin}/routes.py.
    # IMPORTANT: every new top-level route added to FastAPI MUST be added
    # here, otherwise nginx falls back to serving the SPA index.html and
    # fetch() returns "<!DOCTYPE..." instead of JSON. Keep alphabetical.
    location ~ ^/(admin|art_direction|auth|config|debug|docs|files|me|openapi\.json|projects|registry|series|system|tasks|upload|video|voices)(/|$) {
        proxy_pass http://backend:17177;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
